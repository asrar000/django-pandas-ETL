# ─────────────────────────────────────────────────────────────────────────────
#  E-Commerce ETL Pipeline — PostgreSQL + OpenSearch via Docker
#
#  Start:   docker compose up -d db opensearch
#  Stop:    docker compose down
#  Logs:    docker compose logs -f db
#  psql:    docker compose exec db psql -U etl_user -d etl_db
#  Search:  curl http://localhost:9200
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    container_name: ecommerce_etl_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB:       etl_db
      POSTGRES_USER:     etl_user
      POSTGRES_PASSWORD: etl_password

    ports:
      - "5432:5432"         # host:container — accessible at localhost:5432

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d etl_db"]
      interval: 10s
      timeout:  5s
      retries:  5

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: ecommerce_etl_opensearch
    restart: unless-stopped

    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"

    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

    ports:
      - "9200:9200"
      - "9600:9600"

    volumes:
      - opensearch_data:/usr/share/opensearch/data

volumes:
  postgres_data:
    driver: local
  opensearch_data:
    driver: local
