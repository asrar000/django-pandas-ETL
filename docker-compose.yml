# ─────────────────────────────────────────────────────────────────────────────
#  E-Commerce ETL Pipeline — PostgreSQL + OpenSearch + Iceberg + DynamoDB Local via Docker
#
#  Start:   docker compose up -d db opensearch dynamodb-local
#  Stop:    docker compose down
#  Logs:    docker compose logs -f db
#  psql:    docker compose exec db psql -U etl_user -d etl_db
#  Search:  curl http://localhost:9200
#  Dynamo:  http://localhost:8000
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    container_name: ecommerce_etl_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB:       etl_db
      POSTGRES_USER:     etl_user
      POSTGRES_PASSWORD: etl_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d etl_db"]
      interval: 10s
      timeout:  5s
      retries:  5

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: ecommerce_etl_opensearch
    restart: unless-stopped

    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"

    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

    ports:
      - "9200:9200"
      - "9600:9600"

    volumes:
      - opensearch_data:/usr/share/opensearch/data

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: ecommerce_etl_dynamodb_local
    restart: unless-stopped
    working_dir: /home/dynamodblocal
    # FIX: -dbPath must point at a directory writable by uid 1000 (dynamodblocal user).
    # The bind mount below gives us that control; the named volume approach fails
    # because Docker initialises named volumes as root-owned.
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data -disableTelemetry"

    ports:
      - "8000:8000"

    volumes:
      # FIX: bind mount instead of named volume so we can chmod before first run.
      # Run once before `docker compose up`:
      #   mkdir -p dynamodb_data && chmod 777 dynamodb_data
      - ./dynamodb_data:/home/dynamodblocal/data

volumes:
  postgres_data:
    driver: local
  opensearch_data:
    driver: local
  # dynamodb_local_data removed — replaced by bind mount above