# ─────────────────────────────────────────────────────────────────────────────
#  E-Commerce ETL Pipeline — PostgreSQL + OpenSearch + DynamoDB Local via Docker
#
#  Start:   docker compose up -d db opensearch dynamodb-local dynamodb-admin
#  Stop:    docker compose down
#  Logs:    docker compose logs -f dynamodb-local
#  psql:    docker compose exec db psql -U etl_user -d etl_db
#  Dynamo:  http://localhost:8000
#  Dashboard: http://localhost:8001
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    container_name: ecommerce_etl_postgres
    restart: unless-stopped

    environment:
      POSTGRES_DB:       etl_db
      POSTGRES_USER:     etl_user
      POSTGRES_PASSWORD: etl_password

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl_user -d etl_db"]
      interval: 10s
      timeout:  5s
      retries:  5

  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: ecommerce_etl_opensearch
    restart: unless-stopped

    environment:
      discovery.type: single-node
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "true"

    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

    ports:
      - "9200:9200"
      - "9600:9600"

    volumes:
      - opensearch_data:/usr/share/opensearch/data

  dynamodb-local:
    image: amazon/dynamodb-local:latest
    container_name: ecommerce_etl_dynamodb_local
    restart: unless-stopped
    working_dir: /home/dynamodblocal
    command: "-jar DynamoDBLocal.jar -sharedDb -dbPath /home/dynamodblocal/data -disableTelemetry"

    ports:
      - "8000:8000"

    volumes:
      - ./dynamodb_data:/home/dynamodblocal/data

  dynamodb-admin:
    image: aaronshaf/dynamodb-admin
    container_name: ecommerce_etl_dynamodb_admin
    restart: unless-stopped

    environment:
      DYNAMO_ENDPOINT: "http://dynamodb-local:8000"
      AWS_REGION: "us-east-1"
      AWS_ACCESS_KEY_ID: "dummy"
      AWS_SECRET_ACCESS_KEY: "dummy"

    ports:
      - "8001:8001"

    depends_on:
      - dynamodb-local

volumes:
  postgres_data:
    driver: local
  opensearch_data:
    driver: local