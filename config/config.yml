api:
  base_url: "https://dummyjson.com"
  carts_endpoint: "/carts"
  users_endpoint: "/users"
  max_retries: 5
  backoff_factor: 2
  timeout: 30
  limit: 100

processing:
  num_synthetic_records: 10000
  currency_symbol: "$"

spark:
  app_name: "ecommerce_etl_iceberg"
  master: "local[*]"
  shuffle_partitions: 8

iceberg:
  catalog: "local"
  database: "analytics"
  warehouse_dir: "data/iceberg/warehouse"
  package: "org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.10.1"

database:
  host: "localhost"
  port: 5432
  name: "etl_db"
  user: "etl_user"
  password: "etl_password"

opensearch:
  host: "localhost"
  port: 9200
  use_ssl: false
  verify_certs: false
  timeout: 30
  customer_index: "customer_analytics"
  order_index: "order_analytics"
  spark_package: "org.opensearch.client:opensearch-spark-35_2.12:2.0.0"
  username: ""
  password: ""

dynamodb:
  endpoint_url: "http://localhost:8000"
  region_name: "us-east-1"
  access_key_id: "dummy"
  secret_access_key: "dummy"
  analytics_table: "etl_analytics"

paths:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  iceberg_dir: "data/iceberg"
  logs_dir: "logs"

logging:
  level: "INFO"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"